# Host Nginx for IP-only production (no domain / SSL yet).
# Install: sudo cp deploy/nginx/campusloop-ip.conf /etc/nginx/sites-available/campusloop
#          sudo ln -sf /etc/nginx/sites-available/campusloop /etc/nginx/sites-enabled/campusloop
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    # Default nginx limit is 1MB — causes 413 on announcement/classwork uploads.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    location /up {
        proxy_pass http://127.0.0.1:8000/up;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:8000/storage/;
        client_max_body_size 100M;
    }
}
