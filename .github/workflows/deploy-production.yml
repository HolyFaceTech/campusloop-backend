name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, campusloop-prod]
    defaults:
      run:
        working-directory: /opt/campusloop/campusloop-backend

    steps:
      - name: Pull latest backend
        run: git pull origin main

      - name: Build and start backend services
        run: |
          docker compose -f compose.prod.yaml --env-file compose.prod.env up -d --build backend queue

      - name: Run migrations
        run: |
          docker compose -f compose.prod.yaml --env-file compose.prod.env exec -T backend php artisan migrate --force

      - name: Clear and rebuild caches
        run: |
          # Stop queue worker to free RAM on small EC2 instances (exit 137 = OOM during cache)
          docker compose -f compose.prod.yaml --env-file compose.prod.env stop queue || true
          docker compose -f compose.prod.yaml --env-file compose.prod.env exec -T backend php artisan config:clear
          docker compose -f compose.prod.yaml --env-file compose.prod.env exec -T backend php artisan config:cache
          docker compose -f compose.prod.yaml --env-file compose.prod.env exec -T backend php artisan route:cache
          docker compose -f compose.prod.yaml --env-file compose.prod.env start queue
